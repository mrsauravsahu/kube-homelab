apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  namespace: argo-cd
  name: letsencrypt-prod--argo-cd
spec:
  acme:
    email: mrsauravsahu@outlook.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: le-issuer-account-key--argo-cd
    solvers:
    - dns01:
        cloudflare:
          email: mrsauravsahu@outlook.com
          apiTokenSecretRef:
            name: cloudflare-apikey-secret
            key: apikey
      selector:
        dnsNames:
        - "argo.mrsauravsahu.in"
        - "argo.local.mrsauravsahu.in"
